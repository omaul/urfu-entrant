<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>УрФУ 2026 — абитуриенты по направлениям: конкурс и рейтинг</title>
  <meta name="description" content="Статистика приёмной кампании УрФУ 2026: заявления по направлениям, конкурс, рейтинг абитуриентов по баллам и позиция «где я». Данные обновляются каждый день.">
  <link rel="canonical" href="https://omaul.github.io/urfu-entrant/">
  <meta name="theme-color" content="#1F44C4">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="УрФУ — абитуриенты по направлениям">
  <meta property="og:title" content="УрФУ 2026 — абитуриенты по направлениям">
  <meta property="og:description" content="Конкурс, рейтинг по баллам и позиция «где я» по каждому направлению. Данные обновляются каждый день.">
  <meta property="og:url" content="https://omaul.github.io/urfu-entrant/">
  <meta property="og:image" content="https://omaul.github.io/urfu-entrant/assets/og.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:locale" content="ru_RU">
  <meta name="twitter:card" content="summary_large_image">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "УрФУ — абитуриенты по направлениям",
    "url": "https://omaul.github.io/urfu-entrant/",
    "description": "Статистика приёмной кампании УрФУ 2026: заявления по направлениям, конкурс, рейтинг абитуриентов по баллам и позиция «где я». Данные обновляются каждый день.",
    "applicationCategory": "EducationalApplication",
    "operatingSystem": "Any",
    "inLanguage": "ru",
    "isAccessibleForFree": true
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="wrap">

  <noscript>
    <p>Интерактивная статистика приёмной кампании УрФУ 2026: количество заявлений по направлениям,
      конкурс, рейтинг абитуриентов по баллам и позиция «где я». Для работы приложения включите JavaScript.</p>
  </noscript>

  <header class="top">
    <div>
      <div class="eyebrow">УрФУ · приёмная кампания</div>
      <h1>Абитуриенты по направлениям</h1>
      <div class="sub" id="dataSub">Заявления, конкурс и рейтинги приёмной кампании</div>
    </div>
  </header>

  <main>
  <!-- ============ LOADER (виден, пока грузится срез, и как фолбэк при ошибке) ============ -->
  <section id="loader" class="card">
    <div class="row">
      <button class="btn primary hidden" id="btnSnap">Открыть встроенный срез</button>
      <button class="btn" id="btnFetch">Загрузить свежие с сервера</button>
    </div>
    <div class="status" id="status"></div>
  </section>

  <!-- ============ APP ============ -->
  <section id="app" class="hidden">
    <div class="stats">
      <div class="stat"><div class="n" id="sEntrants">0</div><div class="l">абитуриентов</div></div>
      <div class="stat"><div class="n" id="sApps">0</div><div class="l">заявлений всего</div></div>
      <div class="stat"><div class="n" id="sShownCount">0</div><div class="l" id="sShownLbl">в текущем срезе</div></div>
      <div class="stat"><div class="n" id="sDirs">0</div><div class="l">направлений в списке</div></div>
    </div>

    <div class="controls">
      <div class="field">
        <label>Режим</label>
        <div class="seg" id="segView">
          <button data-v="summary" class="on">Сводка</button>
          <button data-v="first">1-й выбор</button>
          <button data-v="rating">Рейтинг</button>
          <button data-v="me">Где я</button>
        </div>
      </div>
      <div class="field" data-views="summary first">
        <label>Группировать</label>
        <div class="seg" id="segGroup">
          <button data-v="program" class="on">Программа</button>
          <button data-v="speciality">Специальность</button>
        </div>
      </div>
      <div class="field" data-views="summary">
        <label>Считать</label>
        <div class="seg" id="segMode">
          <button data-v="apps" class="on">Заявления</button>
          <button data-v="people">Людей</button>
        </div>
      </div>
      <div class="field" data-views="summary rating first">
        <label for="fComp">Финансирование</label>
        <select id="fComp"><option value="">все</option></select>
      </div>
      <div class="field" data-views="summary rating first">
        <label for="fInst">Институт / филиал</label>
        <select id="fInst"><option value="">все</option></select>
      </div>
      <div class="field" data-views="summary rating">
        <label for="fStatus">Статус</label>
        <select id="fStatus"><option value="">все</option></select>
      </div>
      <div class="field" data-views="summary rating">
        <label for="fPrio">Приоритет</label>
        <select id="fPrio"><option value="">любой</option></select>
      </div>
      <div class="field" data-views="summary rating">
        <label>Балл</label>
        <div style="display:flex;gap:6px;align-items:center">
          <input type="number" id="fSmin" aria-label="Балл от" placeholder="от" style="min-width:66px;width:66px">
          <span style="color:var(--faint)">–</span>
          <input type="number" id="fSmax" aria-label="Балл до" placeholder="до" style="min-width:66px;width:66px">
        </div>
      </div>
      <div class="field grow" data-views="summary rating first">
        <label for="fSearch">Поиск направления</label>
        <input type="text" id="fSearch" placeholder="напр. Технология машиностроения">
      </div>
    </div>

    <div class="tablecard" id="cardSummary">
      <div class="thead">
        <div class="c-rank">#</div>
        <div class="c-name">Направление</div>
        <div class="c-count" id="thCount">Кол-во ↓</div>
      </div>
      <div class="rows" id="rows"></div>
    </div>

    <div class="tablecard hidden" id="cardRating">
      <div class="thead thead-r">
        <div>#</div>
        <div>Рег. номер</div>
        <div>Направление</div>
        <div class="sortable" data-k="priority">Приор.</div>
        <div class="sortable" data-k="achievs">ИД</div>
        <div class="sortable on" data-k="total">Балл ↓</div>
      </div>
      <div class="rows" id="rowsR"></div>
    </div>

    <div class="tablecard hidden" id="cardFirst">
      <div class="thead thead-f">
        <div>#</div>
        <div>Направление</div>
        <div>1-м приоритетом</div>
        <div>Всего</div>
        <div>Доля 1-х <span class="hint" tabindex="0" data-tip="Абитуриент подаёт заявления сразу на несколько программ и расставляет им приоритет — первый приоритет — это то, что он хочет больше всего. «Доля 1-х» — какая часть подавших на это направление выбрала его первым приоритетом, а не запасным вариантом.">i</span></div>
      </div>
      <div class="rows" id="rowsF"></div>
    </div>

    <div class="tablecard hidden" id="cardMe">
      <div class="me-controls">
        <div class="field grow">
          <label for="meDir">Направление</label>
          <input type="text" id="meDir" list="dirList" placeholder="начни вводить название…" autocomplete="off">
          <datalist id="dirList"></datalist>
        </div>
        <div class="field">
          <label for="meComp">Финансирование</label>
          <select id="meComp"><option value="">любое</option></select>
        </div>
        <div class="field">
          <label for="meScore">Твой балл</label>
          <input type="number" id="meScore" placeholder="напр. 260" style="width:104px">
        </div>
      </div>
      <div id="meResult" class="me-result"></div>
    </div>

    <div class="footer">
      <span id="ftInfo"></span>
      <span style="display:flex;gap:8px">
        <button class="btn" id="btnCsv">Скачать CSV</button>
        <button class="btn" id="btnUpdate">Обновить с сервера</button>
      </span>
    </div>
  </section>
  </main>

</div>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
</body>
</html>
