name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 7 * * *' # 12:00 по Екатеринбургу (UTC+5)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # свежие данные тянем только по расписанию и при ручном запуске,
      # чтобы не долбить API на каждый пуш; если urfu.ru недоступен —
      # публикуем закоммиченный срез
      - name: Refresh snapshot
        if: github.event_name != 'push'
        continue-on-error: true
        run: node scripts/update-snapshot.mjs

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
